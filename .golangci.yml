version: "2"

run:
  timeout: 5m
  tests: true

formatters:
  enable:
    - gofmt

linters:
  enable:
    - revive
    - govet
    - errcheck
    - ineffassign
    - staticcheck
    - gosec
    - gocyclo
    - dupl
    - misspell
    - unparam
    - nakedret
    - prealloc
    - gocritic
    - gochecknoinits
    - gochecknoglobals

linters-settings:
  errcheck:
    exclude-functions:
      - (io.Closer).Close
      - encoding/json.(*Encoder).Encode
  gocyclo:
    min-complexity: 15
  dupl:
    threshold: 100
  goconst:
    min-len: 2
    min-occurrences: 2
  misspell:
    locale: US
  revive:
    rules:
      - name: exported
        disabled: true
      - name: package-comments
        disabled: true
      - name: var-naming
        disabled: true

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - gocyclo
        - errcheck
        - dupl
        - gosec
    - path: pkg/storage/local\.go
      linters:
        - gosec
      text: "G304"
